version: "3.9"

services:
  bff:
    build:
      context: ./apps/bff
      dockerfile: Dockerfile
    container_name: apmcb-bff
    restart: unless-stopped
    environment:
      PORT: "3001"
      NODE_ENV: production
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      WEB_URL: ${WEB_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      # Fail Fast no boot: totp.ts e index.ts exigem estas vars em NODE_ENV=production
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      FINGERPRINT_SDK: ${FINGERPRINT_SDK:-zkteco}
      ZKTECO_LIB_PATH: ${ZKTECO_LIB_PATH:-/usr/lib/libzkfp.so}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
    volumes:
      - bff_logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - apmcb-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  bff_logs:

networks:
  apmcb-net:
    driver: bridge
