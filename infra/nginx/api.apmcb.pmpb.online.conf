# APMCB BFF — reverse proxy nginx (api.apmcb.pmpb.online)
#
# Referência de infra-as-code: reflete a config REAL de
# /etc/nginx/sites-enabled/apmcb no VPS Hetzner (não versionada pelo sistema
# de arquivos do servidor — este arquivo é a cópia de auditoria/histórico).
# Qualquer mudança aplicada no servidor via SSH deve ser replicada aqui.
#
# Substitui o antigo nginx/nginx.conf (removido) — aquele arquivo descrevia
# uma topologia docker-compose com serviço `bff:3001` que não existe mais;
# a arquitetura real usa nginx do sistema (apt) + BFF rodando em container
# Docker standalone, com deploy blue/green via infra/scripts/deploy-bff.sh
# (upstream dinâmico em /opt/apmcb/nginx-bff-active.conf, alternando entre
# 127.0.0.1:3001 "blue" e a porta "green" a cada deploy, com healthcheck
# antes do reload).

limit_req_zone $binary_remote_addr zone=bff:10m rate=120r/m;

# Upstream dinâmico — atualizado pelo deploy-bff.sh via nginx-bff-active.conf
# nginx -s reload aplica sem derrubar conexões ativas (graceful)
upstream apmcb_bff {
    include /opt/apmcb/nginx-bff-active.conf;
    keepalive 32;
}

server {
    server_name 91.99.113.89 api.apmcb.pmpb.online;

    # Headers de segurança — SSOT desta camada (nginx é a borda, sempre na
    # frente do BFF em produção). O Hono (apps/bff/src/index.ts) também roda
    # secureHeaders() com os defaults — protege acesso direto ao BFF sem
    # nginx na frente (dev local em localhost:3001). Pra evitar os DOIS
    # headers divergentes na mesma resposta em produção (achado durante
    # investigação do incidente de 502/CORS em /api/session/mode:
    # X-Frame-Options SAMEORIGIN do Hono + DENY do nginx, etc.),
    # proxy_hide_header remove a versão do Hono desses 3 headers ANTES do
    # add_header abaixo adicionar a versão do nginx — sem isso o BFF ficaria
    # sem nenhuma proteção nesses 3 headers quando acessado sem nginx.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location /health {
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header Referrer-Policy;
        proxy_pass http://apmcb_bff;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    # Biometric Bridge Phase 1B (bridge-facing, device-auth Ed25519) —
    # location mais específica que /api/ abaixo, nginx casa pelo prefixo mais
    # longo. SEM limit_req por IP: o BFF já tem um bucket dedicado
    # (rateLimitBiometricBridge, apps/bff/src/middleware/rate-limit.ts)
    # chaveado por X-Bridge-Device-Id, não IP — exatamente para que múltiplos
    # bridges atrás do mesmo NAT/reserva não disputem o mesmo orçamento.
    # Herdar o limit_req de /api/ (120r/m por IP, burst=60) anularia esse
    # desenho: 2+ bridges no mesmo IP de saída, cada um dentro do próprio
    # orçamento do BFF, já ultrapassam o limite por IP do nginx antes de
    # chegar no Hono (achado de code review, 2026-07-19). O bucket do BFF
    # continua sendo a defesa real contra abuso deste path.
    location /api/biometric-bridge/ {
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header Referrer-Policy;
        proxy_pass http://apmcb_bff;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
    }

    location /api/ {
        limit_req zone=bff burst=60 nodelay;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header Referrer-Policy;
        proxy_pass http://apmcb_bff;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Defesa em profundidade contra o incidente de 502 "upstream sent too
        # big header" (dois Set-Cookie de sessão na mesma resposta somando
        # ~3.4KB, perto do default de 4KB). O bug de origem foi corrigido no
        # BFF (apps/bff/src/middleware/auth.ts), mas o buffer maior dá
        # margem para crescimento futuro (JWT maior, mais headers) sem
        # depender só da aplicação nunca duplicar cookies.
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
    }

    location = / {
        return 404;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.apmcb.pmpb.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.apmcb.pmpb.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = api.apmcb.pmpb.online) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name 91.99.113.89 api.apmcb.pmpb.online;
    return 404;
}
