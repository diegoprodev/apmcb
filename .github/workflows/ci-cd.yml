name: CI/CD — APMCB

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Type check + lint ─────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @apmcb/shared build
      - run: cd apps/bff && npx tsc --noEmit
      - run: cd apps/web && npx tsc --noEmit

  # ── 2. E2E Smoke (bloqueia deploy se falhar) ─────────────────────────────────
  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @apmcb/web exec playwright install chromium --with-deps
      - name: Run smoke tests
        run: cd apps/web && pnpm exec playwright test --project=chromium --timeout=60000
        env:
          E2E_BASE_URL: https://apmcb.pages.dev
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_BFF_URL: ${{ secrets.E2E_BFF_URL }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ── 3. Deploy BFF no VPS (apenas main, após smoke) ───────────────────────────
  deploy-bff:
    name: Deploy BFF (VPS)
    runs-on: ubuntu-latest
    needs: [typecheck]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 91.99.113.89
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/apmcb
            git pull origin main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build bff
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d bff
            echo "BFF deployed at $(date)"

  # ── 4. Notify deploy status ──────────────────────────────────────────────────
  notify:
    name: Deploy Status
    runs-on: ubuntu-latest
    needs: [e2e-smoke, deploy-bff]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Summary
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- TypeCheck: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- E2E Smoke: ${{ needs.e2e-smoke.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- BFF Deploy: ${{ needs.deploy-bff.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- CF Pages: triggered automatically on push" >> $GITHUB_STEP_SUMMARY
