name: CI/CD — APMCB

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Type check ─────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @apmcb/shared build
      - run: cd apps/bff && npx tsc --noEmit
      - run: cd apps/web && npx tsc --noEmit

  # ── 2. E2E Smoke ─────────────────────────────────────────────────────────────
  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Cache Playwright browsers entre runs (a chave inclui versão do Playwright)
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/package.json') }}

      # Instala browsers apenas se não estiverem em cache
      # Roda dentro de apps/web para garantir o path correto
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd apps/web && pnpm exec playwright install chromium --with-deps

      # Se cache hit, ainda instala dependências de sistema (sem re-baixar browsers)
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: cd apps/web && pnpm exec playwright install-deps chromium

      - name: Run smoke tests
        run: cd apps/web && pnpm exec playwright test --project=chromium --timeout=60000
        env:
          E2E_BASE_URL: https://apmcb.pmpb.online
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_BFF_URL: ${{ secrets.E2E_BFF_URL }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ── 2b. E2E Suite — CRUD/jornadas básicas (criar, editar, desativar, notificações) ──
  # Antes só o smoke (41 testes) rodava em CI; o projeto "suite" (148 testes,
  # cobre crud-usuarios/arsenal/saidas, regression, TOTP, notificações) só era
  # disparado manualmente. Foi assim que um bug de coluna inexistente em
  # PATCH /api/profiles/:id (editar/desativar usuário, 500 há 2+ semanas) passou
  # despercebido — o teste que pegaria isso (crud-usuarios.spec.ts U4/U11) existe
  # desde sempre, só nunca rodou automaticamente.
  e2e-suite:
    name: E2E Suite (CRUD + jornadas)
    runs-on: ubuntu-latest
    # needs e2e-smoke (não só typecheck): ambos rodam contra o MESMO banco de
    # produção usando as mesmas contas fixture (admin@apmcb.dev, armeiro@...,
    # cadete@...). Rodar em paralelo arriscaria U4/U11 de crud-usuarios.spec.ts
    # (que editam uma linha arbitrária da grid, não um usuário descartável)
    # colidirem com apmcb.spec.ts logando/mutando essas mesmas contas.
    needs: [typecheck, e2e-smoke]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/package.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd apps/web && pnpm exec playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: cd apps/web && pnpm exec playwright install-deps chromium

      - name: Run CRUD/journeys suite
        run: cd apps/web && pnpm exec playwright test --project=suite --timeout=60000
        env:
          E2E_BASE_URL: https://apmcb.pmpb.online
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_BFF_URL: ${{ secrets.E2E_BFF_URL }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-suite
          path: apps/web/playwright-report/
          retention-days: 7

  # ── 3. Deploy BFF no VPS — Blue/Green com rollback automático ────────────────
  deploy-bff:
    name: Deploy BFF (VPS)
    runs-on: ubuntu-latest
    needs: [typecheck]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH (blue/green + health check + rollback)
        uses: appleboy/ssh-action@v1
        with:
          host: 91.99.113.89
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /var/www/apmcb
            git fetch origin main
            git reset --hard origin/main

            # Salva a imagem atual como rollback antes de substituir
            CURRENT_IMG=$(docker inspect --format='{{.Config.Image}}' apmcb-bff 2>/dev/null || true)
            if [ -n "$CURRENT_IMG" ]; then
              docker tag "$CURRENT_IMG" apmcb-bff:rollback
              echo "Rollback image tagged: $CURRENT_IMG"
            fi

            # Build nova imagem
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build bff

            # Garante liberação completa da porta 3001 antes de subir novo container
            # 1. Stop via compose (aguarda processo encerrar antes de liberar binding)
            docker compose -f docker-compose.yml -f docker-compose.prod.yml stop bff 2>/dev/null || true
            # 2. Remove o container por nome
            docker rm -f apmcb-bff 2>/dev/null || true
            # 3. Mata orphan containers em qualquer estado que usem a porta 3001
            #    Nota: filtro "publish" usa só a porta, sem IP (127.0.0.1: causa erro)
            for CID in $(docker ps -aq --filter "publish=3001"); do
              docker stop "$CID" 2>/dev/null || true
              docker rm -f "$CID" 2>/dev/null || true
            done
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --force-recreate --remove-orphans bff

            # Health check: espera até 60s (20 tentativas × 3s)
            HEALTHY=false
            for i in $(seq 1 20); do
              sleep 3
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' apmcb-bff 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ]; then
                HEALTHY=true
                break
              fi
              echo "Aguardando health check... tentativa $i/20 (status: $STATUS)"
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "ERRO: health check falhou — iniciando rollback automático"
              docker rm -f apmcb-bff 2>/dev/null || true
              if docker image inspect apmcb-bff:rollback >/dev/null 2>&1; then
                docker run -d \
                  --name apmcb-bff \
                  --restart unless-stopped \
                  --network apmcb_apmcb-net \
                  -p 127.0.0.1:3001:3001 \
                  --env-file /var/www/apmcb/.env \
                  apmcb-bff:rollback
                echo "Rollback concluído — versão anterior restaurada"
              else
                echo "CRÍTICO: sem imagem de rollback disponível"
              fi
              exit 1
            fi

            echo "BFF deployed successfully at $(date)"

  # ── 4. Summary ───────────────────────────────────────────────────────────────
  notify:
    name: Deploy Status
    runs-on: ubuntu-latest
    needs: [e2e-smoke, e2e-suite, deploy-bff]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Summary
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- TypeCheck: ✅" >> $GITHUB_STEP_SUMMARY
          echo "- E2E Smoke: ${{ needs.e2e-smoke.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- E2E Suite (CRUD/jornadas): ${{ needs.e2e-suite.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- BFF Deploy: ${{ needs.deploy-bff.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- CF Pages: triggered automatically on push to main" >> $GITHUB_STEP_SUMMARY
