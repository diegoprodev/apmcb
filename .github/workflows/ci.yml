name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck shared
        run: pnpm --filter @apmcb/shared typecheck

      - name: Typecheck BFF
        run: pnpm --filter @apmcb/bff typecheck

      - name: Test BFF (inclui regressão IDOR de tenant scoping)
        run: pnpm --filter @apmcb/bff test

      - name: Gate OBS17 — zero console.* no BFF (usar lib/logger)
        run: pnpm --filter @apmcb/bff lint:logs

      - name: Typecheck web
        run: pnpm --filter @apmcb/web typecheck

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        # Env vars are set in Cloudflare Pages dashboard — not needed here for CI check
        run: pnpm --filter @apmcb/web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
          NEXT_PUBLIC_BFF_URL: "https://placeholder.com"
