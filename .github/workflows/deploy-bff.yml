name: Deploy BFF

on:
  push:
    branches: [main]
    paths:
      - "apps/bff/**"
      - "packages/shared/**"
      - "docker-compose.yml"
      - "nginx/**"

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /var/www/apmcb
            git pull origin main
            docker compose -f /var/www/apmcb/docker-compose.prod.yml build bff --no-cache
            docker compose -f /var/www/apmcb/docker-compose.prod.yml up -d
            docker image prune -f
            echo "Deploy complete — health:"
            sleep 3
            curl -sf http://localhost:3001/health
